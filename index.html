<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>ZB BERONED Logo</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #e9dfc7;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(255,255,255,0.15), transparent 60%),
      radial-gradient(circle at 80% 70%, rgba(0,0,0,0.04), transparent 60%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Arial Black', Arial, sans-serif;
  }

  .logo-wrap {
    text-align: center;
  }

  .zb {
    position: relative;
    font-size: 90px;
    font-weight: 900;
    line-height: 1;
    letter-spacing: -6px;
    display: inline-flex;
    align-items: baseline;
  }

  .zb .z {
    color: #2fd8c9;
    text-shadow:
      2px 2px 0 rgba(0,0,0,0.15),
      0 3px 6px rgba(0,0,0,0.15);
  }

  .zb .b {
    position: relative;
    color: #2fd8c9;
    -webkit-text-stroke: 2px #1fa89c;
    text-shadow:
      3px 3px 0 rgba(0,0,0,0.18),
      0 4px 8px rgba(0,0,0,0.2);
  }

  .brand {
    margin-top: 4px;
    font-size: 34px;
    font-weight: 900;
    letter-spacing: 2px;
  }

  .brand .ber {
    color: #2fd8c9;
  }

  .brand .oned {
    color: #f4ede0;
    -webkit-text-stroke: 1px #d8cdb2;
  }
</style>
</head>
<body>
  <div class="logo-wrap">
    <div class="zb">
      <span class="z">Z</span><span class="b">B</span>
    </div>
    <div class="brand"><span class="ber">BER</span><span class="oned">ONED</span></div>
  </div>
</body>
</html>
